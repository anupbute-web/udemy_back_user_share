syntax = "proto3";

package home;

service GetCourseInfo {
    rpc CourseInfo (CourseRequest) returns (CourseResponse);
    rpc PriceInfo (PriceRequest) returns (PriceResponse);
}

message PriceRequest{
    repeated string ids = 1;
}

message PriceResponseObj{
    repeated string courseids = 1;
    int32 amount = 2;
}

message PriceResponse{
    repeated PriceResponseObj data = 1;
}

// Client ye bhejega
message CourseRequest {
    string id = 1; 
}

// Server ye wapas dega
message CourseResponse {
    string _id = 1;
    string image_url = 2;
    string price = 3;
    string title = 4;
    string instructor = 5;
    string content_duration = 6;
}